<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recipe Website</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main>
    <h1>My Recipe Website</h1>
    <nav class="tabs">
      <button type="button" class="tab-btn active" data-tab="create">Create Recipe</button>
      <button type="button" class="tab-btn" data-tab="recipes">My Recipes</button>
    </nav>

    <div id="tab-create" class="tab-panel active">
      <p class="subtitle">Speak your recipe, then create a structured version with ingredients, steps, and tags.</p>
    <section class="voice-section">
      <h2>Voice input</h2>
      <div class="controls">
        <button type="button" id="startBtn">Start voice</button>
        <button type="button" id="stopBtn" disabled>Stop</button>
        <button type="button" id="createRecipeBtn">Create recipe</button>
      </div>
      <div class="status" id="status" aria-live="polite">Ready. Click &quot;Start voice&quot; to begin.</div>
      <div class="transcript-box">
        <label for="transcript">Transcript</label>
        <textarea id="transcript" rows="4" readonly placeholder="Your speech will appear here…"></textarea>
      </div>
    </section>
      <div class="response-box" id="responseBox" hidden>
        <h3>Latest recipe</h3>
        <div id="latestRecipe"></div>
      </div>
    </div>

    <div id="tab-recipes" class="tab-panel">
      <h2>All recipes</h2>
      <div id="recipesList"></div>
    </div>
  </main>

  <div id="editModal" class="modal" hidden>
    <div class="modal-content">
      <h3>Edit recipe</h3>
      <form id="editForm">
        <label for="editTitle">Title</label>
        <input type="text" id="editTitle" required />
        <label for="editIngredients">Ingredients (one per line)</label>
        <textarea id="editIngredients" rows="6"></textarea>
        <label for="editSteps">Steps (one per line)</label>
        <textarea id="editSteps" rows="6"></textarea>
        <label>Tags</label>
        <div class="tag-checkboxes">
          <label><input type="checkbox" name="editTag" value="breakfast" /> Breakfast</label>
          <label><input type="checkbox" name="editTag" value="lunch" /> Lunch</label>
          <label><input type="checkbox" name="editTag" value="dinner" /> Dinner</label>
          <label><input type="checkbox" name="editTag" value="snacks" /> Snacks</label>
        </div>
        <div class="modal-actions">
          <button type="button" id="editCancelBtn">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
